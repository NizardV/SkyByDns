networks:
  dns-network:
    driver: bridge

services:
  db:
    image: postgres:alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: StrongPassword123!
      POSTGRES_DB: dnsmanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dns-network
    ports:
      - "5433:5432"

  api:
    image: ghcr.io/diiagecucdb/di1-p3-e1/management-dns-api:main
    container_name: dns-manager-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=dnsmanager;Username=postgres;Password=StrongPassword123!"
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      db:
        condition: service_started
    networks:
      - dns-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  dotnet_publish: